[flake8]
max-line-length = 100
extend-ignore =
    E501,
    W503,
    W504,
    E203,
    E402,
    E731,
    E741
per-file-ignores =
    **/__init__.py: F401, F403
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .eggs,
    *.egg-info,
    dist,
    build,
    notebooks,
    frontend,
    data,
    models

[isort]
profile = black
line_length = 100
known_first_party = src
skip_glob = **/migrations/*

[tool:pytest]
addopts = --tb=short
