[flake8]
max-line-length = 100
extend-ignore =
    # line too long (handled by black)
    E501,
    # line break before binary operator
    W503,
    # line break after binary operator
    W504,
    # whitespace before ':'
    E203,
    # module level import not at top of file (needed for lazy imports)
    E402,
    # do not assign a lambda expression
    E731,
    # ambiguous variable name
    E741
per-file-ignores =
    # __init__.py re-exports are expected
    **/__init__.py: F401, F403
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    env,
    .eggs,
    *.egg-info,
    dist,
    build,
    notebooks,
    frontend,
    data,
    models
