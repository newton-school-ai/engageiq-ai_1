name: CI

on:
  push:
    branches: ["dev", "main", "feature/**"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: engageiq_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/engageiq_test
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key-placeholder' }}
      LLM_PROVIDER: groq
      SECRET_KEY: ci-test-secret-key
      DEBUG: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgomp1 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf2.0-0 \
            libcairo2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Verify package imports
        run: |
          python -c "from src.agents import supervisor; print('agents OK')"
          python -c "from src.scoring import engagement_score; print('scoring OK')"
          python -c "from src.nudge import nudge_decision; print('nudge OK')"
          python -c "from src.analytics import class_aggregator; print('analytics OK')"
          python -c "from src.api.main import app; print('API OK')"

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --max-line-length=100 --extend-ignore=E501,W503

      - name: Check formatting with black
        run: |
          black --check src/ tests/

      - name: Check import ordering with isort
        run: |
          isort --check-only src/ tests/

      - name: Run tests with pytest
        run: |
          set +e
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 5 ]; then
            echo "No tests collected yet (scaffold phase) - OK"
            exit 0
          fi
          exit $EXIT_CODE

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dockerfile syntax
        run: docker build --dry-run -t engageiq-ai:ci . 2>&1 | head -20 || echo "Dockerfile syntax check completed"
