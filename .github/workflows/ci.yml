name: CI

on:
  pull_request:
    branches: ["dev", "main"]

jobs:
  lint-and-test:
    name: Lint & Test (Python 3.10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: engageiq_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/engageiq_test
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key-placeholder' }}
      LLM_PROVIDER: groq
      SECRET_KEY: ci-test-secret-key
      DEBUG: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libxext6 \
            libxrender-dev \
            libgomp1 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libcairo2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run Black check
        run: |
          black --check src/ tests/

      - name: Run Isort check
        run: |
          isort --check src/ tests/

      - name: Run Flake8 linter
        run: |
          flake8 src/ tests/

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build --build-arg REQUIREMENTS_FILE=requirements-ci.txt -t engageiq-ai:ci .

      - name: Run container
        run: |
          docker run -d --name test-app -p 8000:8000 -e DATABASE_URL=postgresql://postgres:postgres@localhost:5432/engageiq_dev -e GROQ_API_KEY=test-key-placeholder engageiq-ai:ci

      - name: Verify health check
        run: |
          # Wait up to 30 seconds for the service to start
          for i in {1..15}; do
            if curl --silent --fail http://localhost:8000/health; then
              echo "Health check succeeded!"
              exit 0
            fi
            echo "Waiting for app to start..."
            sleep 2
          done
          echo "Health check failed!"
          docker logs test-app
          exit 1

      - name: Stop container
        if: always()
        run: |
          docker rm -f test-app || true
